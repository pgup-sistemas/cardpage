<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card — Cartão Público</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f0ee;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem;font-family:'Inter',sans-serif}
.phone-frame{width:360px;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 4px 32px rgba(0,0,0,.12);border:.5px solid #ddd}
.cover{height:110px;background:linear-gradient(135deg,#1a3a4a,#003049,#004a6e);position:relative;overflow:visible}
.cover-inner{position:absolute;inset:0;display:flex;align-items:flex-start;justify-content:flex-end;padding:10px 14px}
.cover-tag{background:rgba(0,0,0,.32);color:#EAE2B7;font-size:10px;padding:3px 8px;border-radius:20px;display:flex;align-items:center;gap:5px}
.avatar-wrap{position:absolute;bottom:-28px;left:18px}
.avatar{width:58px;height:58px;border-radius:50%;background:#FCBF49;border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:20px;color:#003049}
.card-info{background:#fff;padding:36px 18px 14px}
.card-name{font-size:17px;font-weight:600;color:#003049}
.card-role{font-size:12px;color:#6b6b6b;margin-top:2px}
.badge-pro{display:inline-flex;align-items:center;gap:4px;background:#FCBF49;color:#003049;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:6px}
.social-row{display:flex;gap:8px;margin-top:10px}
.soc-btn{width:32px;height:32px;border-radius:8px;background:#003049;display:flex;align-items:center;justify-content:center}
.soc-btn i{color:#EAE2B7;font-size:15px}
.divider{height:.5px;background:#e5e5e3;margin:0 18px}
.bio-block{padding:14px 18px}
.bio-text{font-size:13px;color:#52514e;line-height:1.65}
.links-block{padding:4px 18px 14px;display:flex;flex-direction:column;gap:8px}
.link-btn{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;font-size:13px;font-weight:500;border:none;width:100%;cursor:pointer}
.link-btn i{font-size:16px;flex-shrink:0}
.link-btn span{flex:1;text-align:left}
.link-btn .arr{font-size:14px;opacity:.7}
.btn-red{background:#D62828;color:#fff}
.btn-orange{background:#F77F00;color:#fff}
.btn-outline{background:transparent;color:#003049;border:1.5px solid #003049}
.contacts-block{padding:14px 18px;display:flex;flex-direction:column;gap:10px}
.contact-row{display:flex;align-items:center;gap:10px;font-size:13px;color:#52514e}
.contact-row i{color:#003049;font-size:16px;flex-shrink:0}
.gallery-block{padding:0 18px 14px}
.gallery-label{font-size:12px;font-weight:500;color:#003049;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.gallery-thumb{aspect-ratio:1;border-radius:8px;overflow:hidden}
.form-block{padding:14px 18px;background:#f9f9f7}
.form-title{font-size:13px;font-weight:600;color:#003049;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.form-input{width:100%;border:.5px solid #ccc;border-radius:8px;padding:9px 11px;font-size:12px;font-family:'Inter',sans-serif;margin-bottom:7px;outline:none}
.form-textarea{width:100%;border:.5px solid #ccc;border-radius:8px;padding:9px 11px;font-size:12px;font-family:'Inter',sans-serif;resize:none;height:64px;margin-bottom:7px;outline:none}
.form-btn{width:100%;background:#D62828;color:#fff;border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;font-family:'Inter',sans-serif}
.card-footer{background:#EAE2B7;padding:9px 18px;display:flex;align-items:center;justify-content:center;gap:6px}
.card-footer span{font-size:11px;color:#003049;opacity:.6}
.card-footer i{color:#003049;font-size:13px;opacity:.5}
</style>
</head>
<body>
<div class="phone-frame">
  <div class="cover">
    <div class="cover-inner"><div class="cover-tag"><i class="ti ti-photo"></i> foto de capa</div></div>
    <div class="avatar-wrap"><div class="avatar">MJ</div></div>
  </div>
  <div class="card-info">
    <div class="card-name">Maria Júlia Santos</div>
    <div class="card-role">Designer &amp; Fotógrafa · Porto Velho, RO</div>
    <div class="badge-pro"><i class="ti ti-star"></i> PRO</div>
    <div class="social-row">
      <div class="soc-btn"><i class="ti ti-brand-instagram"></i></div>
      <div class="soc-btn"><i class="ti ti-brand-linkedin"></i></div>
      <div class="soc-btn"><i class="ti ti-brand-whatsapp"></i></div>
      <div class="soc-btn"><i class="ti ti-globe"></i></div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="bio-block"><div class="bio-text">Especialista em branding visual e fotografia de produto. Atendo presencialmente e online em Porto Velho, RO.</div></div>
  <div class="divider"></div>
  <div class="links-block">
    <button class="link-btn btn-red"><i class="ti ti-briefcase"></i><span>Ver portfólio</span><i class="ti ti-arrow-right arr"></i></button>
    <button class="link-btn btn-orange"><i class="ti ti-qrcode"></i><span>Pagar via PIX</span><i class="ti ti-arrow-right arr"></i></button>
    <button class="link-btn btn-outline"><i class="ti ti-calendar"></i><span>Agendar horário</span><i class="ti ti-arrow-right arr"></i></button>
  </div>
  <div class="divider"></div>
  <div class="gallery-block" style="padding-top:14px">
    <div class="gallery-label"><i class="ti ti-photo" style="font-size:14px"></i>Galeria</div>
    <div class="gallery-grid">
      <div class="gallery-thumb"><div style="width:100%;height:100%;background:#d4c5b0;min-height:80px"></div></div>
      <div class="gallery-thumb"><div style="width:100%;height:100%;background:#b0c5d4;min-height:80px"></div></div>
      <div class="gallery-thumb"><div style="width:100%;height:100%;background:#c5d4b0;min-height:80px"></div></div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="contacts-block">
    <div class="contact-row"><i class="ti ti-phone"></i><span>(69) 99999-0000</span></div>
    <div class="contact-row"><i class="ti ti-mail"></i><span>maria@exemplo.com</span></div>
    <div class="contact-row"><i class="ti ti-map-pin"></i><span>Porto Velho, Rondônia</span></div>
    <button class="link-btn btn-outline" style="margin-top:4px"><i class="ti ti-user-plus"></i><span>Salvar contato</span><i class="ti ti-download arr"></i></button>
  </div>
  <div class="divider"></div>
  <div class="form-block">
    <div class="form-title"><i class="ti ti-message-circle" style="font-size:15px;color:#003049"></i>Enviar mensagem</div>
    <input class="form-input" placeholder="Seu nome">
    <input class="form-input" placeholder="E-mail">
    <textarea class="form-textarea" placeholder="Mensagem..."></textarea>
    <button class="form-btn"><i class="ti ti-send" style="font-size:15px"></i>Enviar mensagem</button>
  </div>
  <div class="card-footer"><i class="ti ti-credit-card"></i><span>Criado com Card · pageup.net.br</span></div>
</div>
</body>
</html>
